body:
  text: 大陰眽大陰眽是胃眽殹彼胃出魚股陰下廉腨上廉出內踝之上廉是動則病上當走心使復張善噫食欲歐得後與氣則怢快然衰是巨太陰眽主治其所産病心煩死心痛與復張死不能食不能卧強吹三者同則死唐泄死水與閉同則死為十病
