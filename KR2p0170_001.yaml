body:
  text: 巨陽眽巨陽眽潼外踝婁中出却中上穿䟴出猒中夾脊出於項頭角下顏夾𩩲毄目內廉是動則病潼頭痛脊痛要以折脾不可以運膕如結腨如裂此為踝蹶是巨陽眽主治其所産病頭痛耳聾項痛耳強瘧北痛要痛尻痛𦛱痛腨痛足小指痹為十二病
