body:
  text: 陽明眽陽明眽毄於骭骨外廉循骭而上穿臏出魚股之外廉上穿乳穿頰出目外廉環顏是動則病灑灑病寒喜龍婁吹顏黑病穜病至則惡人與火聞木音則然驚心腸欲獨閉戶牖而處病甚則欲登高而歌棄衣而走此為骭蹶是陽明眽主治其所産病顏痛鼻肍領頸痛乳痛心與胠痛腹外穜陽痛膝跳付為十病
