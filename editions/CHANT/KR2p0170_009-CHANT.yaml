body:
  text: 少陰眽少陰眽𣪠於內腂外廉穿腨出𦛱中央上穿脊之廉𣪠於腎夾舌本是動則病如喘坐而起則目瞙如毋見心如縣病飢氣不足善怒心腸恐人將捕之不欲食面黭黯若色欬則有血此為骨蹶是少陰眽主治其所產病口熱舌柝嗌乾上氣饐嗌中痛癉耆卧欬音為十病少陰之眽久則強食產肉緩帶皮髮大丈重履而步久幾息則病已矣
