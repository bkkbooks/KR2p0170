body:
  text: 厥陰眽厥陰眽𣪠於足大指菆毛之上乘足跗上廉去內腂一寸上腂五寸而出大陰之後上出魚股內廉觸少腹大漬旁是動則病丈夫隤山婦人則少腹穜要痛不可以卬甚則嗌乾面疵是厥陰眽主治其所產病熱中降隤扁山五病有而心煩死勿治殹有陽眽與之俱病可治殹
