body:
  text: 少陽眽少陽眽𣪠於外踝之前廉上出魚股之外出脇上出目前是動則病心與脅痛不可以反稷甚則無膏足外反此為陽蹶是少陽眽主治其所產病頭頸痛脅痛瘧汗出節盡痛脾外廉痛痛魚股痛膝外廉痛振寒足中指踝為十二病及溫
